<!doctype html>
<html lang="th">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>Sunee & Supakit | The Wedding</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Sans+Thai:wght@300;400;500&family=Playfair+Display:ital,wght@0,700;0,900;1,400&display=swap"
            rel="stylesheet"
        />

        <style>
            *,
            *::before,
            *::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            :root {
                --blush: #ede8df;
                --blush-pale: #f8f6f2;
                --blush-mid: #d9d2c6;
                --wine: #4a6b48;
                --wine-mid: #7d9e7b;
                --white: #ffffff;
                --text: #1c1c1c;
                --text-soft: #6b6b6b;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                overflow: hidden;
                background-color: var(--blush-pale);
                font-family: "IBM Plex Sans Thai", sans-serif;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            /* ── SCENE ── */
            .scene {
                position: fixed;
                inset: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }

            /* ── ENVELOPE CONTAINER ── */
            .envelope-container {
                position: relative;
                cursor: pointer;
                filter: drop-shadow(0 20px 48px rgba(74, 107, 72, 0.18));
                transition: opacity 0.5s ease;
            }
            .envelope-container.hide {
                opacity: 0;
                pointer-events: none;
            }

            .envelope {
                position: relative;
                width: min(88vw, 480px);
                aspect-ratio: 3/2;
                -webkit-transform-style: preserve-3d;
                transform-style: preserve-3d;
                transition: transform 0.4s ease;
            }
            .envelope-container:hover .envelope {
                transform: translateY(-6px) scale(1.01);
            }
            .envelope-container.opening:hover .envelope {
                transform: none;
            }

            .env-back {
                position: absolute;
                inset: 0;
                background: var(--wine);
                border-radius: 6px;
                z-index: 1;
            }

            .card-wrapper {
                position: absolute;
                top: 8px;
                left: 8px;
                right: 8px;
                bottom: 5px;
                z-index: 2;
                transition: transform 1.4s cubic-bezier(0.34, 1.56, 0.64, 1);
                transform-origin: bottom center;
            }
            .envelope-container.opening .card-wrapper {
                transform: translateY(-90px);
                z-index: 40;
            }

            .card {
                width: 100%;
                height: 100%;
                background: var(--white);
                border-radius: 4px;
                display: grid;
                grid-template-columns: 1fr auto;
                overflow: hidden;
            }
            .card-left {
                display: flex;
                flex-direction: column;
                justify-content: center;
                padding: clamp(14px, 4vw, 24px);
                gap: 5px;
            }
            .card-label {
                font-family: "Cormorant Garamond", serif;
                font-style: italic;
                font-size: clamp(0.52rem, 1.4vw, 0.68rem);
                color: var(--wine-mid);
                letter-spacing: 3px;
                text-transform: uppercase;
            }
            .card-title {
                font-family: "Cormorant Garamond", serif;
                font-size: clamp(1.4rem, 3.8vw, 2.1rem);
                font-weight: 500;
                color: var(--wine);
                line-height: 1.1;
            }
            .card-rule {
                width: 30px;
                height: 1px;
                background: var(--wine-mid);
                opacity: 0.45;
                margin: 3px 0;
            }
            .card-names {
                font-family: "Cormorant Garamond", serif;
                font-size: clamp(0.78rem, 1.9vw, 0.98rem);
                font-weight: 600;
                color: var(--text);
                letter-spacing: 0.8px;
            }
            .card-date {
                font-size: clamp(0.54rem, 1.3vw, 0.68rem);
                color: var(--text-soft);
                letter-spacing: 0.5px;
                margin-top: 2px;
            }
            .card-right {
                display: flex;
                height: 100%;
            }
            .card-photo {
                width: clamp(68px, 17vw, 108px);
                height: 100%;
                object-fit: cover;
                object-position: center top;
                display: block;
            }
            .card-date-bar {
                width: 24px;
                height: 100%;
                background: var(--wine);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 3px;
                flex-shrink: 0;
            }
            .card-date-bar span {
                font-family: "Cormorant Garamond", serif;
                font-size: clamp(0.62rem, 1.6vw, 0.82rem);
                font-weight: 600;
                color: #fff;
                writing-mode: vertical-lr;
                transform: rotate(180deg);
                letter-spacing: 2px;
            }
            .card-date-bar .dot {
                width: 2px;
                height: 2px;
                background: rgba(255, 255, 255, 0.38);
                border-radius: 50%;
            }

            /* ── ENVELOPE FRONT ── */
            .env-front {
                position: absolute;
                left: 0;
                right: 0;
                bottom: 0;
                height: 62%;
                z-index: 10;
            }
            .env-body {
                position: absolute;
                inset: 0;
                background: var(--blush);
                border-radius: 0 0 6px 6px;
                clip-path: polygon(0 0, 50% 28%, 100% 0, 100% 100%, 0 100%);
            }

            /* ── FLAP ── */
            .env-flap {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 62%;
                z-index: 20;
                transform-origin: top;
                transition:
                    transform 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                    opacity 0.4s ease 0.2s;
            }
            .envelope-container.opening .env-flap {
                transform: rotateX(180deg);
                z-index: 0;
                opacity: 0;
            }
            .env-flap-front {
                position: absolute;
                inset: 0;
                background: var(--blush);
                clip-path: polygon(0 0, 100% 0, 100% 55%, 50% 90%, 0 55%);
                border-radius: 6px 6px 0 0;
                -webkit-backface-visibility: hidden;
                backface-visibility: hidden;
            }
            .env-flap-back {
                position: absolute;
                inset: 0;
                background: var(--wine);
                opacity: 0.55;
                clip-path: polygon(0 0, 100% 0, 50% 55%);
                border-radius: 6px 6px 0 0;
                transform: rotateX(180deg);
                -webkit-backface-visibility: hidden;
                backface-visibility: hidden;
            }

            /* ── WAX SEAL ── */
            .wax-seal {
                position: absolute;
                top: 56%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: clamp(50px, 11vw, 70px);
                height: clamp(50px, 11vw, 70px);
                z-index: 25;
                transition:
                    transform 0.4s ease,
                    opacity 0.3s ease;
                filter: drop-shadow(0 3px 8px rgba(74, 107, 72, 0.32));
            }
            .envelope-container.opening .wax-seal {
                transform: translate(-50%, -50%) scale(1.4);
                opacity: 0;
                pointer-events: none;
            }

            /* ── TAP HINT ── */
            .tap-hint {
                margin-top: 34px;
                text-align: center;
                transition: opacity 0.3s ease;
            }
            .envelope-container.opening .tap-hint {
                opacity: 0;
            }
            .tap-hint span {
                display: inline-block;
                font-size: 0.78rem;
                color: var(--wine);
                letter-spacing: 2px;
                background: rgba(255, 255, 255, 0.78);
                padding: 5px 18px;
                border-radius: 20px;
                -webkit-backdrop-filter: blur(6px);
                backdrop-filter: blur(6px);
                font-weight: 500;
            }

            /* ════════════════════════════════════════════════
           PORTRAIT CARD — appears after envelope opens
        ════════════════════════════════════════════════ */
            .portrait-stage {
                position: fixed;
                inset: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.8s ease;
                z-index: 60;
            }
            .portrait-stage.show {
                opacity: 1;
                pointer-events: auto;
            }

            .portrait-card {
                position: relative;
                width: min(82vw, 360px);
                aspect-ratio: 3 / 4.5;
                background: var(--white);
                border-radius: 8px;
                overflow: hidden;
                box-shadow: 0 30px 60px rgba(74, 107, 72, 0.28);
                cursor: pointer;
                transform: translateY(40px) scale(0.9);
                transition:
                    transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1),
                    box-shadow 0.3s ease;
            }
            .portrait-stage.show .portrait-card {
                transform: translateY(0) scale(1);
            }
            .portrait-stage.show .portrait-card:hover {
                box-shadow: 0 36px 72px rgba(74, 107, 72, 0.36);
            }

            /* ── NEWSPAPER PORTRAIT CARD ── */
            .newspaper {
                width: 100%;
                height: 100%;
                background: #f4edd6;
                display: flex;
                flex-direction: column;
                padding: clamp(8px, 2.5vw, 13px);
                color: #111;
            }

            .np-thick { height: 3px; background: #111; flex-shrink: 0; }
            .np-thin  { height: 1px; background: #111; flex-shrink: 0; }
            .np-gap   { height: 2px; flex-shrink: 0; }

            .np-title {
                font-family: "Playfair Display", serif;
                font-weight: 900;
                font-size: clamp(0.9rem, 5.5vw, 1.55rem);
                text-align: center;
                letter-spacing: 2px;
                color: #111;
                padding: clamp(4px, 1.2vw, 7px) 0;
                line-height: 1;
                flex-shrink: 0;
            }

            .np-meta {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: clamp(3px, 0.9vw, 5px) 2px;
                flex-shrink: 0;
            }
            .np-meta-date, .np-meta-loc {
                font-family: "Cormorant Garamond", serif;
                font-size: clamp(0.42rem, 1.5vw, 0.56rem);
                line-height: 1.35;
                color: #111;
                letter-spacing: 0.3px;
                text-align: center;
            }
            .np-badge {
                background: #111;
                color: #f4edd6;
                border-radius: 30px;
                padding: 2px 9px;
                font-family: "Cormorant Garamond", serif;
                font-size: clamp(0.42rem, 1.5vw, 0.56rem);
                letter-spacing: 0.5px;
                white-space: nowrap;
                flex-shrink: 0;
            }

            .np-photo-wrap {
                flex: 1;
                overflow: hidden;
                border: 1.5px solid #111;
                margin: clamp(3px, 0.9vw, 6px) 0;
                min-height: 0;
            }
            .np-photo {
                width: 100%;
                height: 100%;
                object-fit: cover;
                object-position: center top;
                display: block;
            }

            .np-foot {
                text-align: center;
                flex-shrink: 0;
            }
            .np-hearts {
                display: flex;
                align-items: center;
                gap: 5px;
                padding: clamp(2px, 0.7vw, 4px) 0;
                font-size: clamp(0.42rem, 1.4vw, 0.58rem);
                color: #111;
            }
            .np-heart-rule {
                flex: 1;
                height: 1px;
                background: #111;
            }
            .np-names {
                font-family: "Playfair Display", serif;
                font-weight: 900;
                font-size: clamp(0.9rem, 5.5vw, 1.55rem);
                letter-spacing: 1.5px;
                color: #111;
                line-height: 1.1;
                padding: clamp(1px, 0.4vw, 3px) 0;
            }
            .np-married {
                font-family: "Cormorant Garamond", serif;
                font-style: italic;
                font-size: clamp(0.55rem, 2vw, 0.78rem);
                color: #111;
                padding-bottom: clamp(2px, 0.5vw, 4px);
                letter-spacing: 0.5px;
            }

            .pc-hint {
                margin-top: 28px;
            }

            /* ── OVERLAY ── */
            .overlay {
                position: fixed;
                inset: 0;
                background: var(--blush-pale);
                z-index: 1000;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.8s ease;
            }
            .overlay.active {
                opacity: 1;
            }

            /* ── LANGUAGE SWITCHER ── */
            .lang-switcher {
                position: fixed;
                top: 16px;
                right: 16px;
                z-index: 200;
            }
            .lang-btn {
                display: flex;
                align-items: center;
                gap: 6px;
                padding: 8px 14px;
                background: rgba(255, 255, 255, 0.92);
                border: 1px solid rgba(74, 107, 72, 0.18);
                border-radius: 50px;
                cursor: pointer;
                font-size: 13px;
                font-weight: 500;
                color: var(--wine);
                box-shadow: 0 2px 10px rgba(74, 107, 72, 0.09);
                backdrop-filter: blur(8px);
                font-family: "IBM Plex Sans Thai", sans-serif;
                transition: all 0.2s;
            }
            .lang-btn:hover {
                border-color: var(--wine);
            }

            .lang-dropdown {
                position: absolute;
                top: calc(100% + 6px);
                right: 0;
                background: rgba(255, 255, 255, 0.98);
                border: 1px solid rgba(74, 107, 72, 0.12);
                border-radius: 14px;
                padding: 6px;
                min-width: 148px;
                box-shadow: 0 8px 24px rgba(74, 107, 72, 0.11);
                opacity: 0;
                visibility: hidden;
                transform: translateY(-8px);
                transition: all 0.2s ease;
            }
            .lang-switcher.open .lang-dropdown {
                opacity: 1;
                visibility: visible;
                transform: translateY(0);
            }
            .lang-option {
                display: flex;
                align-items: center;
                gap: 8px;
                width: 100%;
                padding: 8px 10px;
                border: none;
                background: transparent;
                border-radius: 8px;
                cursor: pointer;
                font-size: 13px;
                font-family: "IBM Plex Sans Thai", sans-serif;
                color: var(--text);
                transition: background 0.15s;
            }
            .lang-option:hover {
                background: rgba(74, 107, 72, 0.06);
            }
            .lang-option.active {
                color: var(--wine);
                font-weight: 600;
            }
        </style>
    </head>

    <body>
        <div class="overlay" id="overlay"></div>

        <!-- Language Switcher -->
        <div class="lang-switcher" id="langSwitcher">
            <button class="lang-btn" id="langBtn">
                <span id="currentFlag">🇹🇭</span>
                <span id="currentLangName">ไทย</span>
            </button>
            <div class="lang-dropdown">
                <button class="lang-option active" data-lang="th">
                    <span>🇹🇭</span><span>ไทย</span>
                </button>
                <button class="lang-option" data-lang="en">
                    <span>🇺🇸</span><span>English</span>
                </button>
                <button class="lang-option" data-lang="ja">
                    <span>🇯🇵</span><span>日本語</span>
                </button>
            </div>
        </div>

        <div class="scene">
            <!-- Envelope -->
            <div class="envelope-container" id="envelopeContainer">
                <div class="envelope">
                    <div class="env-back"></div>

                    <div class="card-wrapper">
                        <div class="card">
                            <div class="card-left">
                                <div class="card-label">Wedding Invitation</div>
                                <div class="card-title">
                                    Sunee<br />&amp; Supakit
                                </div>
                                <div class="card-rule"></div>
                                <div class="card-names">
                                    สุนีย์ &amp; ศุภกิตติ์
                                </div>
                                <div class="card-date">
                                    22 · NOVEMBER · 2026
                                </div>
                            </div>
                            <div class="card-right">
                                <img
                                    src="701AFFE2-8D0D-4D05-8D45-2D18633A0EBA_4_5005_c.jpeg"
                                    alt="Couple"
                                    class="card-photo"
                                />
                                <div class="card-date-bar">
                                    <span>22</span>
                                    <div class="dot"></div>
                                    <span>11</span>
                                    <div class="dot"></div>
                                    <span>26</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="env-front">
                        <div class="env-body"></div>
                    </div>
                    <div class="env-flap">
                        <div class="env-flap-front"></div>
                        <div class="env-flap-back"></div>
                    </div>
                    <img
                        src="assets/theme/fox_seal.png"
                        class="wax-seal"
                        alt="Seal"
                    />
                </div>
                <div class="tap-hint">
                    <span data-i18n="clickHint">แตะเพื่อเปิดซอง</span>
                </div>
            </div>

            <!-- Portrait Card (revealed after envelope opens) -->
            <div class="portrait-stage" id="portraitStage">
                <div class="portrait-card" id="portraitCard">
                    <div class="newspaper">
                        <!-- Top rules -->
                        <div class="np-thick"></div>
                        <div class="np-gap"></div>
                        <div class="np-thin"></div>

                        <!-- Masthead -->
                        <h1 class="np-title">WEDDING DAILY TIMES</h1>

                        <!-- Sub-rule -->
                        <div class="np-thin"></div>

                        <!-- Meta row -->
                        <div class="np-meta">
                            <div class="np-meta-date">SUNDAY<br>NOVEMBER 22, 2026</div>
                            <span class="np-badge">Breaking News</span>
                            <div class="np-meta-loc">BOKRAK<br>RATCHAPHRUEK</div>
                        </div>

                        <!-- Double rule below meta -->
                        <div class="np-thin"></div>
                        <div class="np-gap"></div>
                        <div class="np-thick"></div>

                        <!-- Couple photo -->
                        <div class="np-photo-wrap">
                            <img
                                class="np-photo"
                                src="gallory/2444242F-7559-4BCE-8078-7DB2821EB427_4_5005_c.jpeg"
                                alt="Couple"
                            />
                        </div>

                        <!-- Footer: hearts + names -->
                        <div class="np-foot">
                            <div class="np-thin"></div>
                            <div class="np-hearts">
                                <span>♥</span>
                                <div class="np-heart-rule"></div>
                                <span>♥</span>
                            </div>
                            <div class="np-names">SUNEE &amp; SUPAKIT</div>
                            <div class="np-married">Are Getting Married</div>
                        </div>

                        <!-- Bottom rule -->
                        <div class="np-thick"></div>
                    </div>
                </div>
                <div class="tap-hint pc-hint">
                    <span data-i18n="enterHint">แตะการ์ดเพื่อเข้าชม</span>
                </div>
            </div>
        </div>

        <script>
            const container = document.getElementById("envelopeContainer");
            const overlay = document.getElementById("overlay");
            const portraitStage = document.getElementById("portraitStage");
            const portraitCard = document.getElementById("portraitCard");
            let opened = false;
            let entered = false;

            // If bfcache restores this page (back from wedding_card.html),
            // forward immediately — never show the envelope animation again
            window.addEventListener("pageshow", (e) => {
                if (e.persisted) window.location.replace("wedding_card.html");
            });

            container.addEventListener("click", () => {
                if (opened) return;
                opened = true;
                container.classList.add("opening");
                setTimeout(() => {
                    container.classList.add("hide");
                    portraitStage.classList.add("show");
                }, 1800);
            });

            portraitCard.addEventListener("click", () => {
                if (entered) return;
                entered = true;
                overlay.classList.add("active");
                setTimeout(() => {
                    window.location.replace("wedding_card.html");
                }, 500);
            });

            // Language switcher
            (function () {
                const t = {
                    th: {
                        langName: "ไทย",
                        flag: "🇹🇭",
                        clickHint: "แตะเพื่อเปิดซอง",
                        enterHint: "แตะการ์ดเพื่อเข้าชม",
                    },
                    en: {
                        langName: "English",
                        flag: "🇺🇸",
                        clickHint: "Tap to open",
                        enterHint: "Tap card to enter",
                    },
                    ja: {
                        langName: "日本語",
                        flag: "🇯🇵",
                        clickHint: "タップして開く",
                        enterHint: "カードをタップ",
                    },
                };
                let lang = localStorage.getItem("wedding_lang") || "th";
                const s = document.getElementById("langSwitcher");
                const b = document.getElementById("langBtn");

                function set(l) {
                    if (!t[l]) return;
                    lang = l;
                    localStorage.setItem("wedding_lang", l);
                    document.querySelectorAll("[data-i18n]").forEach((e) => {
                        const k = e.getAttribute("data-i18n");
                        if (t[l][k]) e.textContent = t[l][k];
                    });
                    document.getElementById("currentFlag").textContent =
                        t[l].flag;
                    document.getElementById("currentLangName").textContent =
                        t[l].langName;
                    document
                        .querySelectorAll(".lang-option")
                        .forEach((o) =>
                            o.classList.toggle("active", o.dataset.lang === l),
                        );
                }

                b.addEventListener("click", (e) => {
                    e.stopPropagation();
                    s.classList.toggle("open");
                });
                document.querySelectorAll(".lang-option").forEach((o) =>
                    o.addEventListener("click", (e) => {
                        e.stopPropagation();
                        set(o.dataset.lang);
                        s.classList.remove("open");
                    }),
                );
                document.addEventListener("click", () =>
                    s.classList.remove("open"),
                );
                set(lang);
            })();
        </script>
    </body>
</html>
